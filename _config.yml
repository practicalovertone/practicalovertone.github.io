# Site settings
title_left    : "Practical"
title_right   : "Overtone" # default: ""
description   : "Minimalist Jekyll theme for technical writing blog."
keywords      : "Music theory, Vocal Pedagogy, VoceVista, Barbershop Harmony, Overtone"
url           : https://practicalovertone.github.io # site url
baseurl       : "" # apply repo name like "/myproject" if used under gh-pages branch, else (under master branch) just leave empty/blank
cover         : "" # image uri like logo/cover image for site seo

google_analytics  : UA-138885568-1
twitter_username  : "@ctfhacker"
comments_enabled  : false # if enabled (set to true), please provide your disqus_username
disqus_shortname  : ""
postshare_enabled : false

# Build settings
permalink   : /:year/:title/
markdown    : kramdown
highlighter : rouge

source      : ./
destination : ./_site

# Sass configuration
sass:
  sass_dir  : assets/scss
  style     : compressed # expanded

# Author settings
author:
  name     : "Cory Duplantis"

plugins_dir:
  - jekyll-sitemap
  - bourbon
  - jekyll-paginate

# navbar pages
navbar:
  - slug : about
    title: About
  - slug : blog
    title: Blog

exclude: ["gulp", "node_modules", "bower", "bower_components", "config.rb", "src", "Gemfile", "Gemfile.lock", ".rvmrc", ".rbenv-version", "package.json", "gulpfile.js", "README.md", "Rakefile", "changelog.md", "script", "vendor/bundle/", "vendor/cache/", "vendor/gems/", "vendor/ruby/"]

theme: jekyll-theme-minimal